<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Neon glow filter for cyan elements -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur1"/>
      <feFlood flood-color="#00E5FF" flood-opacity="0.9" result="color1"/>
      <feComposite in="color1" in2="blur1" operator="in" result="glow1"/>
      <feMerge>
        <feMergeNode in="glow1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur2"/>
      <feFlood flood-color="#00E5FF" flood-opacity="0.85" result="color2"/>
      <feComposite in="color2" in2="blur2" operator="in" result="glow2"/>
      <feMerge>
        <feMergeNode in="glow2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Clean white background -->
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- ===================== EYE SHAPE ===================== -->
  <!-- Outer eye contour: minimalist almond / futuristic shape, deep cyber blue -->
  <path d="M 110 400
           C 110 400, 270 230, 400 230
           C 530 230, 690 400, 690 400
           C 690 400, 530 570, 400 570
           C 270 570, 110 400, 110 400
           Z"
        fill="none"
        stroke="#0B3C6B"
        stroke-width="22"
        stroke-linejoin="round"
        stroke-linecap="round"/>

  <!-- Sharp angular accents at eye corners for "futuristic" edge -->
  <path d="M 110 400 L 150 380 L 150 420 Z" fill="#0B3C6B"/>
  <path d="M 690 400 L 650 380 L 650 420 Z" fill="#0B3C6B"/>

  <!-- ===================== IRIS : NEURAL NETWORK ===================== -->
  <g filter="url(#softGlow)">
    <!-- Outer iris ring -->
    <circle cx="400" cy="400" r="148" fill="none" stroke="#00E5FF" stroke-width="3" opacity="0.55"/>

    <!-- Circuitry connecting lines between nodes -->
    <g stroke="#00E5FF" stroke-width="2.5" opacity="0.85">
      <line x1="400" y1="400" x2="400" y2="270"/>
      <line x1="400" y1="400" x2="503" y2="335"/>
      <line x1="400" y1="400" x2="503" y2="465"/>
      <line x1="400" y1="400" x2="400" y2="530"/>
      <line x1="400" y1="400" x2="297" y2="465"/>
      <line x1="400" y1="400" x2="297" y2="335"/>
      <line x1="400" y1="270" x2="503" y2="335"/>
      <line x1="503" y1="335" x2="503" y2="465"/>
      <line x1="503" y1="465" x2="400" y2="530"/>
      <line x1="400" y1="530" x2="297" y2="465"/>
      <line x1="297" y1="465" x2="297" y2="335"/>
      <line x1="297" y1="335" x2="400" y2="270"/>
    </g>

    <!-- Neural nodes -->
    <g fill="#00E5FF">
      <circle cx="400" cy="270" r="9"/>
      <circle cx="503" cy="335" r="9"/>
      <circle cx="503" cy="465" r="9"/>
      <circle cx="400" cy="530" r="9"/>
      <circle cx="297" cy="465" r="9"/>
      <circle cx="297" cy="335" r="9"/>
    </g>
  </g>

  <!-- ===================== PUPIL : ABSTRACT SHARP 'G' ===================== -->
  <g filter="url(#neonGlow)">
    <!-- Dark core disc for the pupil -->
    <circle cx="400" cy="400" r="78" fill="#06243F"/>

    <!-- Abstract angular G: built from sharp-edged polygon strokes -->
    <path d="M 455 365
             L 400 335
             L 350 365
             L 335 400
             L 350 435
             L 400 465
             L 445 450
             L 445 410
             L 405 410
             L 405 425
             L 432 425"
          fill="none"
          stroke="#00E5FF"
          stroke-width="14"
          stroke-linecap="square"
          stroke-linejoin="miter"/>
  </g>

  <!-- ===================== WORDMARK ===================== -->
  <text x="400" y="690" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="700"
        font-size="58"
        letter-spacing="4"
        fill="#0B3C6B">GLANCER<tspan fill="#00E5FF"> AI</tspan></text>
</svg>
