<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 360" font-family="ui-sans-serif,system-ui,Segoe UI,Roboto,Arial">
  <defs><linearGradient id="bgt" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0b1120"/><stop offset="1" stop-color="#0a2018"/></linearGradient></defs>
  <rect width="820" height="360" rx="18" fill="url(#bgt)"/>
  <rect x="1" y="1" width="818" height="358" rx="17" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="40" y="44" fill="#e5e7eb" font-size="19" font-weight="700">Anatomy of a Distributed Trace</text>
  <text x="40" y="68" fill="#64748b" font-size="13">One request, waterfalled across services (time →)</text>

  <!-- time grid -->
  <g stroke="#1e293b" stroke-width="1">
    <line x1="250" y1="92" x2="250" y2="320"/><line x1="420" y1="92" x2="420" y2="320"/>
    <line x1="590" y1="92" x2="590" y2="320"/><line x1="760" y1="92" x2="760" y2="320"/>
  </g>

  <!-- spans -->
  <g font-size="13" fill="#e5e7eb">
    <rect x="60" y="100" width="700" height="26" rx="6" fill="#22c55e" fill-opacity="0.85"/>
    <text x="70" y="118" fill="#06210f">api-gateway  ·  240ms</text>

    <rect x="120" y="138" width="320" height="26" rx="6" fill="#06b6d4" fill-opacity="0.85"/>
    <text x="130" y="156" fill="#04222a">auth-service  ·  90ms</text>

    <rect x="200" y="176" width="180" height="26" rx="6" fill="#a855f7" fill-opacity="0.85"/>
    <text x="210" y="194" fill="#1a0b2e">db query  ·  52ms</text>

    <rect x="460" y="214" width="260" height="26" rx="6" fill="#f97316" fill-opacity="0.9"/>
    <text x="470" y="232" fill="#2a1206">payment-service  ·  120ms</text>

    <rect x="500" y="252" width="180" height="26" rx="6" fill="#ef4444" fill-opacity="0.9"/>
    <text x="510" y="270" fill="#2a0606">3rd-party API  ·  88ms ⚠</text>
  </g>
  <text x="40" y="312" fill="#f87171" font-size="13">The slow 3rd-party call is instantly visible as the critical-path bottleneck.</text>
</svg>
