<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 360" font-family="ui-sans-serif,system-ui,Segoe UI,Roboto,Arial">
  <defs><linearGradient id="bgg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0b1120"/><stop offset="1" stop-color="#15102b"/></linearGradient></defs>
  <rect width="820" height="360" rx="18" fill="url(#bgg)"/>
  <rect x="1" y="1" width="818" height="358" rx="17" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="410" y="44" fill="#e5e7eb" font-size="19" font-weight="700" text-anchor="middle">The Four Golden Signals</text>

  <g>
    <rect x="70" y="70" width="320" height="118" rx="12" fill="#3b82f6" fill-opacity="0.14" stroke="#3b82f6" stroke-opacity="0.4"/>
    <text x="92" y="108" fill="#60a5fa" font-size="17" font-weight="700">Latency</text>
    <text x="92" y="134" fill="#cbd5e1" font-size="13">How long requests take —</text>
    <text x="92" y="154" fill="#cbd5e1" font-size="13">separate success from errors.</text>
  </g>
  <g>
    <rect x="430" y="70" width="320" height="118" rx="12" fill="#22c55e" fill-opacity="0.14" stroke="#22c55e" stroke-opacity="0.4"/>
    <text x="452" y="108" fill="#4ade80" font-size="17" font-weight="700">Traffic</text>
    <text x="452" y="134" fill="#cbd5e1" font-size="13">Demand on the system —</text>
    <text x="452" y="154" fill="#cbd5e1" font-size="13">requests per second.</text>
  </g>
  <g>
    <rect x="70" y="200" width="320" height="118" rx="12" fill="#ef4444" fill-opacity="0.14" stroke="#ef4444" stroke-opacity="0.4"/>
    <text x="92" y="238" fill="#f87171" font-size="17" font-weight="700">Errors</text>
    <text x="92" y="264" fill="#cbd5e1" font-size="13">Rate of failed requests —</text>
    <text x="92" y="284" fill="#cbd5e1" font-size="13">explicit and implicit.</text>
  </g>
  <g>
    <rect x="430" y="200" width="320" height="118" rx="12" fill="#f97316" fill-opacity="0.14" stroke="#f97316" stroke-opacity="0.4"/>
    <text x="452" y="238" fill="#fb923c" font-size="17" font-weight="700">Saturation</text>
    <text x="452" y="264" fill="#cbd5e1" font-size="13">How "full" the service is —</text>
    <text x="452" y="284" fill="#cbd5e1" font-size="13">the leading indicator.</text>
  </g>
</svg>
