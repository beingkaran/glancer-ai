<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 320" font-family="ui-sans-serif,system-ui,Segoe UI,Roboto,Arial">
  <defs><linearGradient id="bga" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0b1120"/><stop offset="1" stop-color="#1a0b22"/></linearGradient></defs>
  <rect width="820" height="320" rx="18" fill="url(#bga)"/>
  <rect x="1" y="1" width="818" height="318" rx="17" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="410" y="44" fill="#e5e7eb" font-size="19" font-weight="700" text-anchor="middle">The AIOps Pipeline</text>

  <g font-size="13.5" text-anchor="middle">
    <!-- stage 1 -->
    <rect x="40" y="96" width="150" height="120" rx="12" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-opacity="0.45"/>
    <text x="115" y="140" fill="#60a5fa" font-size="15" font-weight="700">Ingest</text>
    <text x="115" y="166" fill="#cbd5e1">Metrics · Logs</text>
    <text x="115" y="184" fill="#cbd5e1">Traces · Events</text>
    <!-- stage 2 -->
    <rect x="230" y="96" width="150" height="120" rx="12" fill="#06b6d4" fill-opacity="0.15" stroke="#06b6d4" stroke-opacity="0.45"/>
    <text x="305" y="140" fill="#22d3ee" font-size="15" font-weight="700">Normalize</text>
    <text x="305" y="166" fill="#cbd5e1">Correlate &amp;</text>
    <text x="305" y="184" fill="#cbd5e1">deduplicate</text>
    <!-- stage 3 -->
    <rect x="420" y="96" width="150" height="120" rx="12" fill="#a855f7" fill-opacity="0.15" stroke="#a855f7" stroke-opacity="0.45"/>
    <text x="495" y="140" fill="#c084fc" font-size="15" font-weight="700">ML Models</text>
    <text x="495" y="166" fill="#cbd5e1">Baselines &amp;</text>
    <text x="495" y="184" fill="#cbd5e1">anomaly scoring</text>
    <!-- stage 4 -->
    <rect x="610" y="96" width="150" height="120" rx="12" fill="#22c55e" fill-opacity="0.15" stroke="#22c55e" stroke-opacity="0.45"/>
    <text x="685" y="140" fill="#4ade80" font-size="15" font-weight="700">Act</text>
    <text x="685" y="166" fill="#cbd5e1">Alerts · RCA</text>
    <text x="685" y="184" fill="#cbd5e1">Auto-remediate</text>
  </g>
  <g fill="#64748b">
    <path d="M192 156 l24 0 m-8 -6 l8 6 -8 6" stroke="#64748b" stroke-width="2" fill="none"/>
    <path d="M382 156 l24 0 m-8 -6 l8 6 -8 6" stroke="#64748b" stroke-width="2" fill="none"/>
    <path d="M572 156 l24 0 m-8 -6 l8 6 -8 6" stroke="#64748b" stroke-width="2" fill="none"/>
  </g>
  <text x="410" y="262" fill="#94a3b8" font-size="13" text-anchor="middle">Raw telemetry in → ranked, actionable insight out — with the noise removed.</text>
</svg>
