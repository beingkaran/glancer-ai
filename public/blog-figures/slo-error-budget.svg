<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 360" font-family="ui-sans-serif,system-ui,Segoe UI,Roboto,Arial">
  <defs><linearGradient id="bgs" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0b1120"/><stop offset="1" stop-color="#1a1206"/></linearGradient></defs>
  <rect width="820" height="360" rx="18" fill="url(#bgs)"/>
  <rect x="1" y="1" width="818" height="358" rx="17" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="40" y="44" fill="#e5e7eb" font-size="19" font-weight="700">SLO &amp; the Error Budget</text>
  <text x="40" y="68" fill="#64748b" font-size="13">Target 99.9% availability → 0.1% is your budget to spend</text>

  <!-- axes -->
  <line x1="80" y1="300" x2="770" y2="300" stroke="#334155" stroke-width="1.5"/>
  <line x1="80" y1="100" x2="80" y2="300" stroke="#334155" stroke-width="1.5"/>

  <!-- SLO target line -->
  <line x1="80" y1="140" x2="770" y2="140" stroke="#22c55e" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="770" y="134" fill="#4ade80" font-size="12" text-anchor="end">SLO target 99.9%</text>

  <!-- budget band -->
  <rect x="80" y="140" width="690" height="36" fill="#f97316" fill-opacity="0.16"/>
  <text x="92" y="164" fill="#fb923c" font-size="12">error budget (0.1%)</text>

  <!-- burndown -->
  <polyline points="80,150 200,154 320,162 440,176 560,196 680,168 770,176" fill="none" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="560" cy="196" r="5" fill="#ef4444"/>
  <text x="560" y="224" fill="#f87171" font-size="12" text-anchor="middle">budget burned → freeze releases</text>

  <text x="120" y="320" fill="#64748b" font-size="12">start of quarter</text>
  <text x="700" y="320" fill="#64748b" font-size="12" text-anchor="end">end of quarter</text>
</svg>
