<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 360" font-family="ui-sans-serif,system-ui,Segoe UI,Roboto,Arial">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1120"/><stop offset="1" stop-color="#111a30"/>
    </linearGradient>
  </defs>
  <rect width="820" height="360" rx="18" fill="url(#bg)"/>
  <rect x="1" y="1" width="818" height="358" rx="17" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- Monitoring panel -->
  <rect x="34" y="48" width="350" height="276" rx="14" fill="#1e3a8a" fill-opacity="0.16" stroke="#3b82f6" stroke-opacity="0.4"/>
  <text x="209" y="86" fill="#60a5fa" font-size="20" font-weight="700" text-anchor="middle">MONITORING</text>
  <text x="209" y="110" fill="#94a3b8" font-size="13" text-anchor="middle">"Is it working?"</text>
  <text x="209" y="146" fill="#e5e7eb" font-size="13.5" text-anchor="middle">Watches known failure modes</text>
  <text x="209" y="172" fill="#e5e7eb" font-size="13.5" text-anchor="middle">Predefined dashboards &amp; alerts</text>
  <text x="209" y="198" fill="#e5e7eb" font-size="13.5" text-anchor="middle">Answers questions you</text>
  <text x="209" y="216" fill="#e5e7eb" font-size="13.5" text-anchor="middle">expected to ask</text>
  <g stroke="#3b82f6" stroke-width="3" stroke-linecap="round">
    <line x1="90" y1="262" x2="130" y2="262"/><line x1="150" y1="262" x2="200" y2="262"/>
    <line x1="220" y1="262" x2="250" y2="262"/><line x1="270" y1="262" x2="330" y2="262"/>
  </g>
  <text x="209" y="300" fill="#64748b" font-size="12" text-anchor="middle">known unknowns</text>

  <!-- Observability panel -->
  <rect x="436" y="48" width="350" height="276" rx="14" fill="#7c3aed" fill-opacity="0.16" stroke="#a855f7" stroke-opacity="0.45"/>
  <text x="611" y="86" fill="#c084fc" font-size="20" font-weight="700" text-anchor="middle">OBSERVABILITY</text>
  <text x="611" y="110" fill="#94a3b8" font-size="13" text-anchor="middle">"Why is it behaving this way?"</text>
  <text x="611" y="146" fill="#e5e7eb" font-size="13.5" text-anchor="middle">Explore unknown failure modes</text>
  <text x="611" y="172" fill="#e5e7eb" font-size="13.5" text-anchor="middle">Metrics + logs + traces</text>
  <text x="611" y="198" fill="#e5e7eb" font-size="13.5" text-anchor="middle">Ask questions you never</text>
  <text x="611" y="216" fill="#e5e7eb" font-size="13.5" text-anchor="middle">anticipated</text>
  <g fill="#a855f7">
    <circle cx="520" cy="262" r="6"/><circle cx="560" cy="248" r="5"/><circle cx="600" cy="270" r="7"/>
    <circle cx="645" cy="252" r="5"/><circle cx="690" cy="266" r="6"/><circle cx="540" cy="278" r="4"/>
    <circle cx="675" cy="240" r="4"/>
  </g>
  <text x="611" y="300" fill="#64748b" font-size="12" text-anchor="middle">unknown unknowns</text>
</svg>
