<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 360" font-family="ui-sans-serif,system-ui,Segoe UI,Roboto,Arial">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0b1120"/><stop offset="1" stop-color="#111a30"/></linearGradient>
  </defs>
  <rect width="820" height="360" rx="18" fill="url(#bg3)"/>
  <rect x="1" y="1" width="818" height="358" rx="17" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="410" y="48" fill="#e5e7eb" font-size="19" font-weight="700" text-anchor="middle">The Three Pillars of Observability</text>

  <!-- Metrics -->
  <rect x="48" y="78" width="220" height="220" rx="14" fill="#06b6d4" fill-opacity="0.12" stroke="#06b6d4" stroke-opacity="0.45"/>
  <g transform="translate(118,118)" stroke="#22d3ee" stroke-width="3" fill="none" stroke-linecap="round">
    <polyline points="0,60 20,40 40,52 60,22 80,34"/>
  </g>
  <text x="158" y="232" fill="#22d3ee" font-size="17" font-weight="700" text-anchor="middle">Metrics</text>
  <text x="158" y="258" fill="#94a3b8" font-size="12.5" text-anchor="middle">Numbers over time</text>
  <text x="158" y="276" fill="#94a3b8" font-size="12.5" text-anchor="middle">Cheap, great for alerts</text>

  <!-- Logs -->
  <rect x="300" y="78" width="220" height="220" rx="14" fill="#a855f7" fill-opacity="0.12" stroke="#a855f7" stroke-opacity="0.45"/>
  <g transform="translate(338,120)" stroke="#c084fc" stroke-width="3" stroke-linecap="round">
    <line x1="0" y1="0" x2="120" y2="0"/><line x1="0" y1="20" x2="92" y2="20"/>
    <line x1="0" y1="40" x2="120" y2="40"/><line x1="0" y1="60" x2="74" y2="60"/>
  </g>
  <text x="410" y="232" fill="#c084fc" font-size="17" font-weight="700" text-anchor="middle">Logs</text>
  <text x="410" y="258" fill="#94a3b8" font-size="12.5" text-anchor="middle">Timestamped events</text>
  <text x="410" y="276" fill="#94a3b8" font-size="12.5" text-anchor="middle">Rich context, verbose</text>

  <!-- Traces -->
  <rect x="552" y="78" width="220" height="220" rx="14" fill="#22c55e" fill-opacity="0.12" stroke="#22c55e" stroke-opacity="0.45"/>
  <g transform="translate(588,120)">
    <rect x="0" y="0" width="150" height="12" rx="6" fill="#4ade80"/>
    <rect x="24" y="22" width="100" height="12" rx="6" fill="#4ade80" fill-opacity="0.8"/>
    <rect x="48" y="44" width="64" height="12" rx="6" fill="#4ade80" fill-opacity="0.6"/>
  </g>
  <text x="662" y="232" fill="#4ade80" font-size="17" font-weight="700" text-anchor="middle">Traces</text>
  <text x="662" y="258" fill="#94a3b8" font-size="12.5" text-anchor="middle">Request across services</text>
  <text x="662" y="276" fill="#94a3b8" font-size="12.5" text-anchor="middle">Finds latency &amp; errors</text>
</svg>
