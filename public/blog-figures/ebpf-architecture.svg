<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 360" font-family="ui-sans-serif,system-ui,Segoe UI,Roboto,Arial">
  <defs><linearGradient id="bge" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0b1120"/><stop offset="1" stop-color="#161024"/></linearGradient></defs>
  <rect width="820" height="360" rx="18" fill="url(#bge)"/>
  <rect x="1" y="1" width="818" height="358" rx="17" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="410" y="44" fill="#e5e7eb" font-size="19" font-weight="700" text-anchor="middle">eBPF: Observability from the Kernel</text>

  <!-- user space -->
  <rect x="50" y="74" width="720" height="104" rx="12" fill="#3b82f6" fill-opacity="0.10" stroke="#3b82f6" stroke-opacity="0.35"/>
  <text x="70" y="100" fill="#60a5fa" font-size="14" font-weight="700">User space</text>
  <g font-size="12.5" fill="#e5e7eb" text-anchor="middle">
    <rect x="90" y="116" width="130" height="44" rx="9" fill="#1e293b"/><text x="155" y="143">App A</text>
    <rect x="250" y="116" width="130" height="44" rx="9" fill="#1e293b"/><text x="315" y="143">App B</text>
    <rect x="410" y="116" width="150" height="44" rx="9" fill="#1e293b"/><text x="485" y="143">Sidecar / agent</text>
    <rect x="590" y="116" width="150" height="44" rx="9" fill="#a855f7" fill-opacity="0.25"/><text x="665" y="143" fill="#c084fc">Telemetry export</text>
  </g>

  <!-- kernel -->
  <rect x="50" y="200" width="720" height="130" rx="12" fill="#22c55e" fill-opacity="0.10" stroke="#22c55e" stroke-opacity="0.35"/>
  <text x="70" y="226" fill="#4ade80" font-size="14" font-weight="700">Kernel space</text>
  <g font-size="12.5" fill="#e5e7eb" text-anchor="middle">
    <rect x="90" y="244" width="150" height="46" rx="9" fill="#0f3d24"/><text x="165" y="271" fill="#86efac">eBPF probe: syscalls</text>
    <rect x="270" y="244" width="150" height="46" rx="9" fill="#0f3d24"/><text x="345" y="271" fill="#86efac">eBPF probe: network</text>
    <rect x="450" y="244" width="150" height="46" rx="9" fill="#0f3d24"/><text x="525" y="271" fill="#86efac">eBPF probe: I/O</text>
    <rect x="630" y="244" width="110" height="46" rx="9" fill="#0f3d24"/><text x="685" y="271" fill="#86efac">maps</text>
  </g>
  <g stroke="#64748b" stroke-width="1.5" fill="none">
    <path d="M165 244 L165 200 M165 200 L665 200 L665 160"/>
    <path d="M345 244 L345 215" /><path d="M525 244 L525 215"/>
  </g>
  <text x="410" y="350" fill="#94a3b8" font-size="12.5" text-anchor="middle">Zero-instrumentation visibility into every process — no code changes required.</text>
</svg>
