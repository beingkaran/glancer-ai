<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4QEVPD5WPY"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-4QEVPD5WPY');
    </script>

    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9454848033838064"
         crossorigin="anonymous"></script>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- viewport-fit=cover lets the UI extend under the notch / home indicator;
         CSS uses env(safe-area-inset-*) to keep content clear of them. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Installable / native-app feel (PWA + iOS & Android web-app shells) -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#000814" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Glancer AI" />
    <meta name="format-detection" content="telephone=no" />

    <title>AI News Today — Latest AI News &amp; Breakthroughs | Glancer AI</title>
    <meta name="description" content="The latest AI news today, updated continuously from 100+ sources — Google AI news, NVIDIA AI news, FTC AI policy, new model releases, research and tools. Scan the day's top AI stories on Glancer AI." />
    <meta name="keywords" content="ai news, latest ai news, ai news today, google ai news, google ai news today, ftc ai news, nvidia ai news today, ai breakthroughs" />
    <meta name="author" content="Glancer AI" />
    <!-- max-image-preview:large is REQUIRED for Google Discover large image cards.
         Without it, Discover cannot render the big visual that drives ~45% of CTR. -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://glancerai.com/" />

     <!-- Aplu Notification -->
    <!-- <script src='https://push.aplu.io/push-notify.js'></script> -->

    <!-- Open Graph / Twitter -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Glancer AI" />
    <meta property="og:title" content="AI News Today — Latest AI News & Breakthroughs" />
    <meta property="og:description" content="The latest AI news today from 100+ sources — Google AI news, NVIDIA AI news, FTC AI policy, model releases, research & tools. Updated continuously on Glancer AI." />
    <meta property="og:url" content="https://glancerai.com/" />
    <meta property="og:image" content="https://glancerai.com/icon-1024.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AI News Today — Latest AI News & Breakthroughs" />
    <meta name="twitter:description" content="The latest AI news today from 100+ sources — Google, NVIDIA, FTC, model releases, research & tools. Updated continuously on Glancer AI." />
    <meta name="twitter:image" content="https://glancerai.com/icon-1024.png" />

    <!-- Site-wide structured data: identifies the publisher (E-E-A-T signal for
         Discover) and enables the Google sitelinks search box. Per-article
         NewsArticle/Article JSON-LD is injected per page (see prerender + React). -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://glancerai.com/#organization",
          "name": "Glancer AI",
          "url": "https://glancerai.com/",
          "logo": "https://glancerai.com/icon-512.png",
          "description": "Glancer AI is an AI news desk covering the latest AI news today from 100+ sources — Google, NVIDIA, OpenAI, FTC AI policy, model releases, research and tools."
        },
        {
          "@type": "WebSite",
          "@id": "https://glancerai.com/#website",
          "url": "https://glancerai.com/",
          "name": "Glancer AI",
          "alternateName": "Glancer AI News",
          "publisher": { "@id": "https://glancerai.com/#organization" },
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://glancerai.com/?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "CollectionPage",
          "@id": "https://glancerai.com/#webpage",
          "url": "https://glancerai.com/",
          "name": "AI News Today — Latest AI News & Breakthroughs",
          "isPartOf": { "@id": "https://glancerai.com/#website" },
          "about": "The latest AI news today: Google AI news, NVIDIA AI news, FTC AI policy, new model releases, research and tools, updated continuously.",
          "keywords": "AI news, latest AI news, AI news today, Google AI news, NVIDIA AI news, FTC AI news"
        }
      ]
    }
    </script>

    <!-- Google AdSense: verify site ownership. -->
    <meta name="google-adsense-account" content="ca-pub-9454848033838064" />

    <!-- Editorial "Intelligence Desk" type system: Newsreader (serif headlines),
         IBM Plex Sans (body/UI), IBM Plex Mono (eyebrows/meta/data). Inter is kept
         only for Chart.js canvas labels + the share-image generator. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600;6..72,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
