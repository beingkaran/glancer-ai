<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- viewport-fit=cover lets the UI extend under the notch / home indicator;
         CSS uses env(safe-area-inset-*) to keep content clear of them. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Installable / native-app feel (PWA + iOS & Android web-app shells) -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#000814" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Glancer AI" />
    <meta name="format-detection" content="telephone=no" />

    <title>Glancer AI — AI News, Metrics, Free AI Tools & Intelligence Hub</title>
    <meta name="description" content="Stay ahead with AI News, industry metrics, leaderboards, expert blogs and 25+ free in-browser AI tools. Glancer AI (glancerai.com) is your intelligent hub for the AI ecosystem." />
    <meta name="author" content="Glancer AI" />
    <!-- max-image-preview:large is REQUIRED for Google Discover large image cards.
         Without it, Discover cannot render the big visual that drives ~45% of CTR. -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://glancerai.com/" />

     <!-- Aplu Notification -->
    <!--script src='https://push.aplu.io/push-notify.js'></script>

    <!-- Open Graph / Twitter -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Glancer AI" />
    <meta property="og:title" content="Glancer AI — AI News, Metrics & Free AI Tools" />
    <meta property="og:description" content="AI News, industry metrics, expert blogs and 25+ free in-browser AI tools — your intelligent hub for the AI ecosystem." />
    <meta property="og:url" content="https://glancerai.com/" />
    <meta property="og:image" content="https://glancerai.com/icon-1024.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://glancerai.com/icon-1024.png" />

    <!-- Site-wide structured data: identifies the publisher (E-E-A-T signal for
         Discover) and enables the Google sitelinks search box. Per-article
         NewsArticle/Article JSON-LD is injected per page (see prerender + React). -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://glancerai.com/#organization",
          "name": "Glancer AI",
          "url": "https://glancerai.com/",
          "logo": "https://glancerai.com/icon-512.png",
          "description": "AI news, industry metrics, expert blogs and free in-browser AI tools."
        },
        {
          "@type": "WebSite",
          "@id": "https://glancerai.com/#website",
          "url": "https://glancerai.com/",
          "name": "Glancer AI",
          "publisher": { "@id": "https://glancerai.com/#organization" },
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://glancerai.com/?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
    </script>

    <!-- Google AdSense: verify site ownership. Replace the client id, then it activates. -->
    <meta name="google-adsense-account" content="ca-pub-0000000000000000" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
