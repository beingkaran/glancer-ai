# Daily rebuild trigger — keeps the programmatic topic hubs + sitemap fresh.
#
# glancerai.com deploys via Cloudflare's git-connected Workers Builds: every
# build runs `npm run build`, which re-fetches the live feed, (re)generates the
# "Signal" summaries using the GEMINI_API_KEY / GROQ_API_KEY set in the
# Cloudflare BUILD environment, and prerenders dist/topic/*.html. So a scheduled
# "rebuild" just needs to kick off a new Cloudflare build — we do that by curling
# a Cloudflare Deploy Hook. No checkout, no npm, no wrangler here.
#
# One-time setup:
#   1. Cloudflare dashboard → your Worker/Pages project → Settings → Builds →
#      Deploy hooks → create a hook, copy its URL.
#   2. GitHub repo → Settings → Secrets and variables → Actions → new secret
#      CLOUDFLARE_DEPLOY_HOOK_URL = <that URL>.
#
# Make sure GEMINI_API_KEY (and/or GROQ_API_KEY) is set in the Cloudflare *build*
# environment (not only as a runtime secret) so summaries are original text.

name: Rebuild topic hubs

on:
  schedule:
    - cron: '17 6 * * *' # daily at 06:17 UTC
  workflow_dispatch: {}   # allow manual runs from the Actions tab

concurrency:
  group: rebuild-hubs
  cancel-in-progress: true

jobs:
  trigger-cloudflare-build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger Cloudflare deploy hook
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_DEPLOY_HOOK_URL }}" ]; then
            echo "::error::CLOUDFLARE_DEPLOY_HOOK_URL secret is not set — see this workflow's header for setup."
            exit 1
          fi
          curl -fsS -X POST "${{ secrets.CLOUDFLARE_DEPLOY_HOOK_URL }}"
          echo "✓ Cloudflare build triggered."
