# Daily rebuild + deploy — keeps the programmatic topic hubs and sitemap fresh.
#
# The topic hubs (dist/topic/*.html) and their "Signal" summaries are baked at
# BUILD time from the live feed, so they only refresh when the site is rebuilt
# and redeployed. A Cloudflare Worker cron trigger can't run an npm build, so we
# use a scheduled GitHub Action instead: it runs `npm run build` (which fetches
# the feed, generates/uses cached Signal summaries, and prerenders the hubs) and
# then `wrangler deploy`.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — token with "Edit Cloudflare Workers" permission
#   CLOUDFLARE_ACCOUNT_ID  — your Cloudflare account id
#   GEMINI_API_KEY         — so Signal summaries are original text, not excerpts
#                            (or GROQ_API_KEY / OPENROUTER_API_KEY instead)
#
# NOTE: if you already deploy via Cloudflare's git integration (Workers Builds),
# you don't need the deploy step here — instead add GEMINI_API_KEY to the
# Cloudflare build environment and trigger a scheduled deploy from its dashboard.
# This workflow is the self-contained alternative that works either way.

name: Rebuild topic hubs

on:
  schedule:
    - cron: '17 6 * * *' # daily at 06:17 UTC
  workflow_dispatch: {}   # allow manual runs from the Actions tab

concurrency:
  group: rebuild-hubs
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (prerender hubs + Signal summaries + sitemap)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: npm run build

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      # Persist the summary cache the build just grew, so tomorrow's run reuses
      # it and re-summarises only genuinely new articles (keeps LLM cost near zero).
      - name: Commit updated summary cache
        run: |
          git config user.name "glancer-bot"
          git config user.email "bot@glancerai.com"
          if ! git diff --quiet -- seo/summary-cache.json; then
            git add seo/summary-cache.json
            git commit -m "chore: refresh topic-hub Signal summary cache [skip ci]"
            git push
          else
            echo "No summary-cache changes to commit."
          fi
